name: CI
on: [push, pull_request]
jobs:
  app:
    runs-on: ubuntu-latest
    env:
      # $env/static/public only exports PUBLIC_* vars defined at build time.
      # CI has no .env file, so provide placeholders to satisfy typecheck + build
      # (this job does not deploy). Real values come from Vercel project env at deploy.
      PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run check          # svelte-check / typecheck
      - run: npx vitest run         # unit/integration
      - run: npm run build          # build must pass
  db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with: { version: 2.75.0 }   # pin: `latest` resolves via the GitHub API → rate-limit failures on CI
      - run: supabase start          # boots local stack + applies migrations (Docker on the runner)
      - run: supabase test db        # pgTAP RLS tests
      - run: supabase db lint         # static schema lint
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - uses: supabase/setup-cli@v1
        with: { version: 2.75.0 }
      - run: supabase start          # local stack + migrations (the e2e DB container is supabase_db_aisafetyideas)
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e        # globalSetup seeds + mints storageStates; authed Playwright suite
        env:
          CI: 'true'
          PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      - if: failure()
        uses: actions/upload-artifact@v4
        with: { name: playwright-report, path: playwright-report/, retention-days: 7 }
